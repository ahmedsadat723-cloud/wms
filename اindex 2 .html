  .scan-guide::before{top:-3px;right:-3px;border-bottom:none;border-left:none;border-radius:0 8px 0 0}
  .scan-guide::after{bottom:-3px;right:-3px;border-top:none;border-left:none;border-radius:0 0 8px 0}
  .scan-guide i{position:absolute;inset:0}
  .scan-guide i::before{top:-3px;left:-3px;border-bottom:none;border-right:none;border-radius:8px 0 0 0}
  .scan-guide i::after{bottom:-3px;left:-3px;border-top:none;border-right:none;border-radius:0 0 0 8px}
  .zoom-row{display:flex;align-items:center;gap:8px;margin-top:8px}

let currentLang = localStorage.getItem('sd_lang') || 'ar';
function t(key, vars){
  let s = (LANG[currentLang] && LANG[currentLang][key]) || LANG.ar[key] || key;
  if(vars) Object.keys(vars).forEach(function(k){ s = s.replace('{'+k+'}', vars[k]); });
  return s;
}
function applyLang(){
  document.documentElement.lang = currentLang;
  document.documentElement.dir = LANG_DIR[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(function(el){ el.textContent = t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('[data-i18n-ph]').forEach(function(el){ el.placeholder = t(el.getAttribute('data-i18n-ph')); });
  document.querySelectorAll('.lang-btn').forEach(function(b){ b.classList.toggle('active-lang', b.getAttribute('data-lang')===currentLang); });
  updateRoomFieldLabel();
  if(typeof updateInstallBannerText==='function') updateInstallBannerText();
}
function setLang(lang){
  currentLang = lang;
  localStorage.setItem('sd_lang', lang);
  applyLang();
  // رسائل الحالة اللحظية (باركود/OCR) بتتكتب مباشرة بلغة وقتها ومش مربوطة بـ data-i18n —
  // نمسحها هنا عشان ميفضلش نص بلغة قديمة فاضل على الشاشة بعد تغيير اللغة
  ['barcodeStatus', 'ocrStatus'].forEach(function(id){
    const el = document.getElementById(id);
    if(el) el.textContent = '';
  });
}
function updateRoomFieldLabel(){
  const hint = document.getElementById('typeLabelHint');
  if(!hint) return;
  const type = document.getElementById('fType').value || 'dry';
  hint.textContent = t('type_'+type);
  const wrap = document.getElementById('roomLabelWrap');
  if(wrap){ wrap.childNodes[0].textContent = t('label_room_prefix'); wrap.childNodes[2].textContent = t('label_room_suffix'); }
  const batchLabel = document.getElementById('batchLabelWrap');
  if(batchLabel) batchLabel.textContent = t(type === 'dry' ? 'label_batch_optional' : 'label_batch');
}

// ===== حالة تحديث التطبيق: بتبان بانر لما يبقى فيه نسخة جديدة متاحة =====
// بعد ما المستخدم يضغط "تحديث الآن" وتعمل reload، ممكن حدث activate/installed يتكرر لحظياً على
// نفس التحديث القديم (تايمنج الـ Service Worker) — الفلاج ده بيمنع ظهور نفس البانر تاني غلط.
var _swJustUpdated = sessionStorage.getItem('swJustUpdated') === '1';
sessionStorage.removeItem('swJustUpdated');
function showUpdateBanner(){
  if(_swJustUpdated) return;
  const b = document.getElementById('updateBanner');
  if(b) b.classList.remove('hidden');
}
function applyAppUpdate(){
  sessionStorage.setItem('swJustUpdated', '1');
  document.getElementById('updateBanner').classList.add('hidden');
  window.location.reload();
}
// ✅ يعمل على GitHub Pages (offline/PWA). نتخطّى بيئات المعاينة (claudeusercontent/blob) اللي ما بتدعمش SW عشان الكونسول يفضل نضيف بلا تحذيرات
if('serviceWorker' in navigator && location.protocol==='https:' && !/claudeusercontent|localhost|127\.0\.0\.1/.test(location.hostname)){
  navigator.serviceWorker.register('sw.js').then(function(reg){
    // فيه Worker قديم شغال وفيه واحد تاني (جديد) لسه واقف مستني — يبقى فيه تحديث جاهز فعلاً
    if(reg.waiting && navigator.serviceWorker.controller) showUpdateBanner();
    reg.addEventListener('updatefound', function(){
      const newWorker = reg.installing;
      if(!newWorker) return;
      newWorker.addEventListener('statechange', function(){
        // 'installed' + فيه Controller حالي = ده تحديث لنسخة موجودة، مش أول تثبيت
        if(newWorker.state === 'installed' && navigator.serviceWorker.controller) showUpdateBanner();
      });
    });
  }).catch(function(){ /* بيئة لا تدعم SW — يُتجاهل بصمت، يعمل طبيعيًا على GitHub Pages */ });
}

let deferredInstallPrompt = null;
let _isIosInstallBanner = false;
function isStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}
function updateInstallBannerText(){
  document.getElementById('installBannerText').textContent = t(_isIosInstallBanner ? 'install_banner_ios' : 'install_banner_default');
}
function installApp(){
  document.getElementById('installBanner').classList.add('hidden');
  if(deferredInstallPrompt){
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.finally(function(){ deferredInstallPrompt = null; });
  }
}
function dismissInstallBanner(){
  document.getElementById('installBanner').classList.add('hidden');
  localStorage.setItem('installBannerDismissed', '1');
}
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  deferredInstallPrompt = e;
  if(!isStandalone() && !localStorage.getItem('installBannerDismissed')){
    updateInstallBannerText();
    document.getElementById('installBanner').classList.remove('hidden');
  }
});
window.addEventListener('appinstalled', function(){
  document.getElementById('installBanner').classList.add('hidden');
  localStorage.removeItem('installBannerDismissed');
});
(function(){
  const isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
  if(isIos && !isStandalone() && !localStorage.getItem('installBannerDismissed')){
    _isIosInstallBanner = true;
    updateInstallBannerText();
    document.getElementById('installBtn').classList.add('hidden');
    document.getElementById('installBanner').classList.remove('hidden');
  }
})();

// ✅ نص البحث الكامل لكل صنف = الاسم الإنجليزي + الوصف العربي + الاسم الأردو مع بعض، عشان المطابقة تشتغل بأي لغة يكتب بيها العامل (عربي/إنجليزي/أردو) —
// tokens بتتحسب مرة واحدة هنا مش كل ضغطة زر، أسرع وأدق
const CATALOG_LIST = Object.keys(CATALOG).map(function(code){
  const nameEn = CATALOG[code].nameEn || '', cat = CATALOG[code].cat || '', nameUr = CATALOG[code].nameUr || '';
  const combined = nameEn+' '+cat+' '+nameUr;
  return { code: code, nameEn: nameEn, cat: cat, nameUr: nameUr, searchText: combined.toUpperCase(), tokens: tokenizeForMatch(combined) };
});

// ✅ نفس منطق classifyItemByCode في ملف الديسكتوب
function classifyItemByCode(code){
  if(!code) return 'dry';
  if(code.startsWith('FG')) return 'final';
  const prefix = code.split('-')[0];
  if(prefix === 'RM') return 'frozen';
  if(prefix === 'PREP' || prefix === 'FORM' || prefix === 'SPIC' || prefix === 'SANIT' || prefix.indexOf('PKG')===0) return 'dry';
  if(code.startsWith('F')) return 'frozen';
  return 'dry';
}

// ===== وضع اللحوم المجمّدة: وزن كل كرتونة على حدة، الإجمالي = مجموع الأوزان =====
// (بعكس التغليف/المنتج النهائي اللي وزنهم موحّد فالإجمالي = عدد × وزن). كل كرتونة لحمة وزنها الصافي مختلف.
let meatCartons = []; // أوزان صافية بالكيلو، عنصر لكل كرتونة

// بيقرّر شكل الشاشة حسب النوع: لحوم متغيّر الوزن = قسم الإدخال الفردي (وإخفاء صف الوزن الموحّد)،
// وأي نوع تاني (أو لحوم بوزن ثابت) = الصف الموحّد العادي (عدد × وزن)
function updateReceivingModeUI(){
  const type = document.getElementById('fType').value;
  const meatSection = document.getElementById('meatSection');
  const unitRow = document.getElementById('unitWeightRow');
  const fixedEl = document.getElementById('meatFixedToggle');
  const fixed = fixedEl && fixedEl.checked;
  const qtyEl = document.getElementById('fQty'), wEl = document.getElementById('fWeight');
  if(type === 'frozen'){
    meatSection.classList.remove('hidden');
    if(fixed){
      // وزن ثابت: نرجع لطريقة عدد × وزن العادية
      document.getElementById('meatEntryWrap').classList.add('hidden');
      unitRow.classList.remove('hidden');
      qtyEl.readOnly = false; wEl.readOnly = false;
      recalcTotalWeight();
    } else {
      document.getElementById('meatEntryWrap').classList.remove('hidden');
      unitRow.classList.add('hidden');
      qtyEl.readOnly = true; wEl.readOnly = true; // مشتقين من قائمة الأوزان
      recalcMeatTotals();
    }
  } else {
    meatSection.classList.add('hidden');
    unitRow.classList.remove('hidden');
    qtyEl.readOnly = false; wEl.readOnly = false;
  }
  applySupplierDefault();
}
// المورد بيختلف حسب النوع: نهائي = قائمة مصانع المنجم الداخلية؛ جاف/مجمّد = اسم مورد/مُصدِّر خارجي (يتملّى من الكتالوج)
function applySupplierDefault(){
  const type = document.getElementById('fType').value;
  const code = document.getElementById('fCode').value.trim();
  const supText = document.getElementById('fSupplier');
  const supFactory = document.getElementById('fSupplierFactory');
  if(!supText || !supFactory) return;
  if(type === 'final'){
    supText.classList.add('hidden');
    supFactory.classList.remove('hidden'); // اختيار المصنع الداخلي
  } else {
    supFactory.classList.add('hidden');
    supText.classList.remove('hidden');
    const catSup = code && CATALOG[code] ? CATALOG[code].supplier : '';
    if(catSup && !supText.value) supText.value = catSup; // ما نكسرش تعديل يدوي
  }
}
function addMeatCarton(){
  const inp = document.getElementById('meatWeightInput');
  const v = parseFloat(inp.value);
  if(!v || v <= 0){ inp.focus(); return; }
  meatCartons.push(Math.round(v * 1000) / 1000);
  inp.value = '';
  inp.focus(); // إدخال متتالي سريع لكل الكراتين
  recalcMeatTotals();
}
function removeMeatCarton(idx){
  meatCartons.splice(idx, 1);
  recalcMeatTotals();
}
function recalcMeatTotals(){
  const list = document.getElementById('meatList');
  const totalsEl = document.getElementById('meatTotals');
  const total = meatCartons.reduce(function(a, b){ return a + b; }, 0);
  if(!meatCartons.length){
    list.innerHTML = '';
    totalsEl.textContent = t('meat_empty_hint');
  } else {
    list.innerHTML = meatCartons.map(function(w, i){
      return '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 8px;background:rgba(15,23,42,.6);border-radius:6px;font-size:13px">'
        + '<span>' + t('meat_carton_n', {n: i + 1}) + '</span>'
        + '<span style="display:flex;align-items:center;gap:10px"><b>' + w.toFixed(3) + ' ' + t('unit_kg_short') + '</b>'
        + '<span onclick="removeMeatCarton(' + i + ')" style="cursor:pointer;color:#f87171;font-weight:700">✕</span></span></div>';
    }).join('');
    totalsEl.textContent = t('meat_totals', {count: meatCartons.length, total: total.toFixed(3)});
  }
  // القائمة هي مصدر الحقيقة لعدد الكراتين والإجمالي في وضع اللحوم المتغيّر
  document.getElementById('fQty').value = meatCartons.length || '';
  document.getElementById('fWeight').value = meatCartons.length ? total.toFixed(3) : '';
}

// ✅ بتقسّم أي نص لكلمات/أرقام منفصلة، عشان مطابقة نص الـ OCR المشوّه (زي "Ch icken" بدل "Chicken")
// \p{L}/\p{N} بيونيكود (مش [A-Z] بس) عشان يشتغل مع أي لغة كتابة — عربي/أردو/إنجليزي — مش بس حروف لاتينية
// تقدر تلاقي تشابه حتى لو النص مش متطابق حرفياً مع اسم الكتالوج، وبأي ترتيب (الكلمة في الأول أو النص أو الآخر)
function tokenizeForMatch(s){
  return (s||'').toUpperCase().match(/[\p{L}]+|[\p{N}]+/gu) || [];
}
// ✅ المرساة: كود المقاس/المواصفة المطبوع على الكرتون — بيتطابق بالحرف مع اسم الداتابيز حتى لو الاسم الظاهر مختلف.
// أقوى إشارة مطابقة عندنا، لأن الاسم بيتترجم/بيتكتب بأشكال كتير بس الكود ثابت. أمثلة:
//   "50CL" = نسبة اللحم الأحمر (Chemical Lean) في لحوم الجملة — بتفرّق بين تشافي غنم وغيره
//   "20*400" = عدد الأكياس × وزن الكيس — بتحدد الصنف بدقة في المنتجات المعبأة
function extractAnchors(text){
  const t = (text||'').toUpperCase();
  const out = [];
  const cl = t.match(/\b\d{2,3}\s*CL\b/g);              // 50CL
  if(cl) cl.forEach(function(x){ out.push(x.replace(/\s+/g,'')); });
  const sz = t.match(/\b\d{1,3}\s*[*xX]\s*\d{2,4}\b/g); // 20*400
  if(sz) sz.forEach(function(x){ out.push(x.replace(/\s+/g,'')); });
  return out;
}

// تقييم مشترك لكل أصناف الكتالوج مقابل نص إدخال — بيستخدمه الكتابة اليدوية والمطابقة التلقائية من الـ OCR سوا.
// الترتيب: (1) تطابق نص كامل +100  (2) مرساة المقاس/الكود +50 لكل مرساة  (3) تطابق كلمات/أرقام جزئي.
function scoreCatalog(text){
  const q = (text||'').trim().toUpperCase();
  const qTokens = tokenizeForMatch(text);
  const anchors = extractAnchors(text);
  return CATALOG_LIST.map(function(c){
    let score = 0;
    if(q.length >= 3 && c.searchText.indexOf(q) >= 0) score += 100; // تطابق نص كامل في أي مكان بالاسم الإنجليزي أو الوصف العربي
    // مرساة المقاس/المواصفة: بنقارن بعد شيل الرموز (فـ"20*400" تساوي "20 X 400") — الصنف اللي فيه نفس الكود بياخد وزن ساحق
    if(anchors.length){
      const csFlat = c.searchText.replace(/[^A-Z0-9]/g,'');
      anchors.forEach(function(a){ if(csFlat.indexOf(a.replace(/[^A-Z0-9]/g,'')) >= 0) score += 50; });
    }
    qTokens.forEach(function(qt){
      if(qt.length < 2) return; // تجاهل حروف مفردة (زي "G" من "700g") عشان ما تضيفش تطابقات وهمية
      const isNumeric = /^[0-9]+$/.test(qt); // رقم = مقاس/وزن — أدق من كلمة عادية في تمييز الأصناف المتشابهة، فبناخده بوزن أعلى
      let matched = 0; // 0=مفيش, 1=جزئي (جوه كلمة تانية), 2=تطابق تام للكلمة/الرقم كامل
      for(const ct of c.tokens){
        if(ct===qt){ matched = 2; break; }
        if(matched < 1 && (ct.indexOf(qt)>=0 || qt.indexOf(ct)>=0)) matched = 1;
      }
      if(matched===2) score += isNumeric ? 2 : 1;
      else if(matched===1) score += isNumeric ? 1 : 0.5;
    });
    return { c: c, score: score };
  }).filter(function(x){ return x.score > 0; }).sort(function(a,b){ return b.score - a.score; });
}

// ===== 🛡️ حارس المتشابهات (مقترح ①) =====
// المصنع بيستلم أصناف كتير شكلها واحد (نفس المورد/الكيس/الليبل) والفرق بينها كود صغير أو كلمة —
// زي بقسماط SO.30 مقابل T.03-B، أو بودرة ثوم مقابل بصل. لو دخلت الغلط الخط = طامة.
// الفكرة: لو الصنف اللي اتعرف عليه ينتمي لمجموعة شبيهة، منقبلوش لوحدنا — نعرض كارت مقارنة
// بيكبّر الجزء الفارق بس، والعامل يأكّد الصنف الصح بضغطة قبل الحفظ.

let confusableConfirmedCode = null; // الكود اللي العامل أكّده صراحةً من كارت المقارنة

// مفتاح الفئة: PKG بيتقسّم لفئاته الفرعية (CTN/RPC/BOX) لأنها مجموعات متشابهة حقيقية، والباقي بالبادئة
function familyKey(code){
  const m = (code||'').match(/^(PKG-[A-Z]+|[A-Z]+)/);
  return m ? m[1] : (code||'');
}
function sigTokens(s){ return tokenizeForMatch(s).filter(function(t){ return t.length >= 4 && !/^\d+$/.test(t); }); }

// مجموعة الأصناف الشبيهة لصنف معيّن: نفس الفئة + بتشارك كلمة دالة واحدة على الأقل (نوع المنتج)
function getConfusableGroup(code){
  const target = CATALOG[code];
  if(!target) return [];
  const fk = familyKey(code);
  const tTok = sigTokens(target.nameEn + ' ' + (target.cat||''));
  if(!tTok.length) return [];
  const group = CATALOG_LIST.filter(function(c){
    if(familyKey(c.code) !== fk) return false;
    const cTok = tokenizeForMatch(c.nameEn + ' ' + (c.cat||''));
    return tTok.some(function(t){ return cTok.indexOf(t) >= 0; });
  });
  return group.length >= 2 ? group : [];
}

// الكلمات الفارقة لصنف داخل مجموعته = النادرة (موجودة في أقلية الأعضاء) — دي اللي فعلاً بتفرّق،
// مش الكلمة العامة اللي في معظمهم (زي CRUMBS/BREADED). بنحسب تكرار كل كلمة في المجموعة ونمسك اللي في النص الأقل.
function distinguishTokens(nameEn, group){
  const n = group.length;
  const freq = {};
  group.forEach(function(c){
    const uniq = {};
    tokenizeForMatch(c.nameEn).forEach(function(t){ uniq[t] = 1; });
    Object.keys(uniq).forEach(function(t){ freq[t] = (freq[t]||0) + 1; });
  });
  const threshold = Math.floor(n / 2); // نادرة = في نص الأعضاء أو أقل
  return tokenizeForMatch(nameEn).filter(function(tok){
    return (freq[tok]||0) <= threshold;
  });
}

// يعرض/يخفي كارت المقارنة حسب الكود الحالي في الحقل
function refreshConfusableGuard(){
  const guardEl = document.getElementById('confusableGuard');
  if(!guardEl) return;
  const code = document.getElementById('fCode').value.trim();
  const group = code ? getConfusableGroup(code) : [];
  if(group.length < 2 || confusableConfirmedCode === code){
    guardEl.classList.add('hidden'); guardEl.innerHTML = ''; return;
  }
  const rows = group.map(function(c){
    const diff = distinguishTokens(c.nameEn, group);
    // تظليل بالتوكن (حروف/أرقام كل على حدة) عشان الأجزاء اللي فيها نقط زي "SO.30" و"T.03-B" تتلوّن صح
    const html = c.nameEn.replace(/[A-Za-z]+|[0-9]+/g, function(w){
      return diff.indexOf(w.toUpperCase()) >= 0
        ? '<b style="color:#fbbf24;font-size:15px">'+w+'</b>' : '<span style="color:#94a3b8">'+w+'</span>';
    });
    const isCur = c.code === code;
    return '<div onclick="confirmConfusable(\''+c.code+'\')" style="padding:11px 12px;border:1px solid '+(isCur?'#fbbf24':'#334155')+';border-radius:9px;margin-top:7px;cursor:pointer;background:'+(isCur?'#3b2f0f':'#0f172a')+'">'
      + '<div style="font-size:13px;line-height:1.5">'+html+'</div>'
      + '<div style="font-size:11px;color:#64748b;margin-top:3px">'+c.code+(c.cat?' · '+c.cat:'')+'</div></div>';
  }).join('');
  guardEl.innerHTML = '<div style="background:#7f1d1d;color:#fff;padding:9px 12px;border-radius:9px;font-size:13px;font-weight:bold">'
    + '⚠️ في '+group.length+' أصناف شبه بعض — أكّد اللي مكتوب على الكرتونة (بصّ للكلمة الصفرا)</div>' + rows;
  guardEl.classList.remove('hidden');
}

// العامل أكّد صنف من الكارت
function confirmConfusable(code){
  const c = CATALOG[code];
  if(!c) return;
  document.getElementById('fItem').value = c.nameEn;
  document.getElementById('fCode').value = code;
  document.getElementById('fType').value = classifyItemByCode(code);
  confusableConfirmedCode = code;
  populateRoomSelect();
  applyCapacityDefaults(code);
  updateReceivingModeUI();
  checkSlotOccupied();
  refreshConfusableGuard();
}

function onItemInput(){
  const raw = document.getElementById('fItem').value.trim();
  const box = document.getElementById('itemSuggestions');
  const matchCode = CATALOG_BY_NAME[raw.toUpperCase()] || CATALOG_BY_CAT[raw] || CATALOG_BY_UR[raw];
  if(matchCode){
    document.getElementById('fCode').value = matchCode;
    document.getElementById('fType').value = classifyItemByCode(matchCode);
    populateRoomSelect();
    applyCapacityDefaults(matchCode);
    updateReceivingModeUI();
    confusableConfirmedCode = matchCode; // كتب الاسم كامل بالظبط = تأكيد صريح
    refreshConfusableGuard();
  }

  if(!raw){ box.classList.add('hidden'); box.innerHTML=''; return; }
  const scored = scoreCatalog(raw);
  const matches = scored.slice(0, 8).map(function(x){ return x.c; });
  if(!matches.length){ box.classList.add('hidden'); box.innerHTML=''; return; }
  box.innerHTML = matches.map(function(c){
    // ✅ يعرض اسم الصنف بلغة الواجهة الحالية (أردو/عربي) لو متوفر، وإلا الاسم الإنجليزي كافتراضي
    const display = (currentLang==='ur' && c.nameUr) ? c.nameUr : (currentLang==='ar' && c.cat) ? c.cat : c.nameEn;
    return '<div class="sugg-row" data-code="'+c.code+'" data-name="'+display.replace(/"/g,'&quot;')+'" style="padding:10px 12px;border-bottom:1px solid #334155;cursor:pointer" onclick="pickSuggestion(this)"><div style="font-size:13.5px">'+display+'</div><div style="font-size:11px;color:#64748b">'+c.code+'</div></div>';
  }).join('');
  box.classList.remove('hidden');
}

function pickSuggestion(el){
  document.getElementById('fItem').value = el.getAttribute('data-name');
  const code = el.getAttribute('data-code');
  document.getElementById('fCode').value = code;
  document.getElementById('fType').value = classifyItemByCode(code);
  populateRoomSelect();
  applyCapacityDefaults(code);
  updateReceivingModeUI();
  checkSlotOccupied();
  const box = document.getElementById('itemSuggestions');
  box.classList.add('hidden'); box.innerHTML = '';
  confusableConfirmedCode = code; // العامل اختار بنفسه من القائمة = تأكيد صريح
  refreshConfusableGuard();
}

// ✅ كل أصناف المواد الخام والمنتج النهائي (RM-*/FG-*) اسمها بيحمل شكل "عدد الأكياس × وزن الكيس" (زي "20*400" = 20 كيس × 400 جرام)،
// وغالبًا الوحدة (جرام/كيلو) مكتوبة صراحة جنب الرقم في الاسم الإنجليزي أو الوصف العربي. لو الاسم مالوش وحدة واضحة (أو الوحدة لتر مش وزن)، منجازفش ونرجّع null.
// بينطبق بس على RM-/FG- لأن أكواد التعبئة (PKG-*) بيحمل نفس شكل الرقم بس بمعنى مختلف تمامًا (مواصفات كرتونة شحن، مش وزن منتج).
function parseWeightFromName(code, nameEn, arDesc){
  if(!/^(RM|FG)-/.test(code) || !nameEn) return null;
  const m = nameEn.match(/(\d+)\s*[*xX]\s*(\d+(?:\.\d+)?)\s*(KG|GM|G|LTR|L)?\b/i);
  if(!m) return null;
  const bags = +m[1], perBag = +m[2], nameUnit = (m[3]||'').toUpperCase();
  if(nameUnit === 'LTR' || nameUnit === 'L' || /لتر/.test(arDesc||'')) return null; // وحدة حجم مش وزن
  const isKg = nameUnit === 'KG' || /كيلو|كجم/.test(arDesc||'');
  const isGram = nameUnit === 'GM' || nameUnit === 'G' || /جرام|جم\b/.test(arDesc||'');
  if(!isKg && !isGram) return null; // مفيش وحدة واضحة — منجازفش بتخمين
  return bags * (isKg ? perBag : perBag / 1000);
}

// بيملأ عدد الكراتين (رصات × كرتون/رصة) ووزن الكرتونة من سعات الطبالي المعتمدة (Supabase) لو الصنف معروف، وإلا من شكل الاسم نفسه — بس لو الحقل لسه فاضي، عشان ميكسرش قيمة الباركود أو تعديل يدوي سابق من العامل
function applyCapacityDefaults(code){
  const entry = CATALOG[code];
  if(!entry) return;
  const cap = entry.oracle && CAPACITY[entry.oracle];
  const qtyEl = document.getElementById('fQty'), wEl = document.getElementById('fUnitWeight'), wUnitEl = document.getElementById('fUnitWeightUnit');
  if(cap){
    if(!qtyEl.value && cap.layers && cap.per) qtyEl.value = cap.layers * cap.per;
    if(!wEl.value && cap.weightKg){ wEl.value = cap.weightKg; wUnitEl.value = 'kg'; }
  }
  if(!wEl.value){
    const fromName = parseWeightFromName(code, entry.nameEn, entry.cat);
    if(fromName){ wEl.value = Math.round(fromName * 1000) / 1000; wUnitEl.value = 'kg'; }
  }
  recalcTotalWeight();
}

document.addEventListener('click', function(e){
  if(e.target.id !== 'fItem' && !e.target.closest('#itemSuggestions')){
    document.getElementById('itemSuggestions').classList.add('hidden');
  }
});

async function afterLoginSuccess(authUser){
  const { data: profile, error } = await supabaseClient.from('profiles').select('*').eq('id', authUser.id).single();
  if(error || !profile || !profile.organization_id){
    showLoginMsg('❌ الحساب مش مربوط بأي شركة بعد', 'err');
    return false;
  }
  CURRENT_ORG_ID = profile.organization_id;
  currentUser = { id: authUser.id, fullName: profile.full_name||authUser.email, role: profile.role||'worker' };
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.remove('hidden');
  loadCapacities();
  return true;
}

// تحميل سعات الطبالي المعتمدة (من نفس الجدول اللي تاب "سعات الطبالي" بديسكتوب بيديره) — لو فشل التحميل (أوفلاين مثلاً) نكمل عادي وترجع مطابقة الصنف تعتمد على تخمين الـ OCR بس
async function loadCapacities(){
  try{
    const { data, error } = await supabaseClient.from('capacities').select('*').eq('organization_id', CURRENT_ORG_ID);
    if(error) return;
    const newCap = {};
    (data||[]).forEach(function(r){ newCap[r.oracle_code] = {layers:r.layers, per:r.per_layer, weightKg:r.weight_kg}; });
    CAPACITY = newCap;
  }catch(e){ console.warn('loadCapacities failed', e); }
}

function showLoginMsg(text, cls){
  const el = document.getElementById('loginMsg');
  el.className = 'msg '+cls; el.textContent = text;
}

async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  if(!email || !pass){ showLoginMsg(t('err_fill_email_pass'), 'err'); return; }
  const remember = document.getElementById('rememberMe').checked;
  localStorage.setItem(REMEMBER_KEY, remember ? '1' : '0');
  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
  if(error || !data.user){ showLoginMsg(t('err_bad_login'), 'err'); return; }
  await afterLoginSuccess(data.user);
}

async function doLogout(){
  await supabaseClient.auth.signOut();
  localStorage.removeItem(REMEMBER_KEY);
  currentUser = null; CURRENT_ORG_ID = null;
  document.getElementById('appScreen').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
}

document.addEventListener('DOMContentLoaded', async function(){
  applyLang();
  try{
    const { data } = await supabaseClient.auth.getSession();
    if(data && data.session){ await afterLoginSuccess(data.session.user); }
  }catch(e){ console.warn('session check failed', e); }
});

function showScreen(name){
  document.getElementById('receiveScreen').classList.toggle('hidden', name!=='receive');
  document.getElementById('searchScreen').classList.toggle('hidden', name!=='search');
  document.getElementById('navReceive').classList.toggle('active', name==='receive');
  document.getElementById('navSearch').classList.toggle('active', name==='search');
}

/* ===== استلام: مسح باركود GS1-128 (تاريخ إنتاج/انتهاء/وزن/باتش) ===== */
// TRY_HARDER بيخلي ZXing يعمل محاولات فك ترميز أعمق (زوايا/تدوير/binarization بديل) بدل محاولة واحدة سريعة —
// ده أقرب لسلوك سكانر الكاميرا الأصلي في الموبايل اللي بيقرا أكواد إحنا بنفشل فيها
const zxingHints = (typeof ZXing !== 'undefined') ? new Map([[ZXing.DecodeHintType.TRY_HARDER, true]]) : null;
const gs1CodeReader = (typeof ZXing !== 'undefined') ? new ZXing.BrowserMultiFormatReader(zxingHints) : null;
async function startBarcodeScan(){
  const statusEl = document.getElementById('barcodeStatus');
  if(!gs1CodeReader && !('BarcodeDetector' in window)){ statusEl.textContent = t('err_no_barcode_lib'); return; }
  document.getElementById('barcodeVideoWrap').classList.remove('hidden');
  document.getElementById('barcodeStartBtn').classList.add('hidden');
  statusEl.textContent = t('scan_aim');
  const video = document.getElementById('barcodeVideo');
  try{
    // من غير تحديد دقة، المتصفح بيديك ستريم منخفض الدقة (زي 640x480) — ده أكبر فرق بين قراءتنا وقراءة كاميرا الموبايل الأصلية،
    // لأن المربع التوجيهي بيقتطع جزء صغير من فريم أصلاً واطي الدقة فيبقى مفيش تفاصيل حقيقية تتقرا. لو الدقة العالية مش متاحة، المتصفح بيرجع لأقرب حاجة متاحة من غير error لأنها "ideal" مش "exact"
    scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 }, advanced: [{ focusMode: 'continuous' }] } });
    video.srcObject = scanStream;
    await video.play();
    setupZoomControl();
    // نفعّل الفوكس التلقائي المستمر لو الجهاز بيدعمه — أهم عامل لوضوح الباركود؛ الصورة المغبشة أكبر سبب لعدم القراءة
    try{
      const track = scanStream.getVideoTracks()[0];
      const caps = track.getCapabilities ? track.getCapabilities() : {};
      if(caps.focusMode && caps.focusMode.indexOf('continuous') !== -1){
        await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
      }
    }catch(e){ /* الجهاز مش بيدعم التحكم في الفوكس — مش مشكلة */ }
    // بنكتب الدقة الفعلية اللي المتصفح وافق عليها جنب النص — لو لسه واطية رغم طلب 4K، ده بيوريك إن السبب حدود الجهاز/المتصفح مش الكود
    // نفضّل محرك الموبايل الأصلي (BarcodeDetector = نفس ML Kit اللي سكانر كاميرا سامسونج بيستخدمه) لو مدعوم —
    // أدق وأسرع بكتير من فك ZXing بالجافاسكريبت. لو مش مدعوم (متصفح قديم/iOS) بنرجع تلقائيًا لمسار ZXing زي ما كان.
    const nativeDetector = await initNativeDetector();
    if(nativeDetector){
      statusEl.textContent = t('scan_aim') + ' (' + video.videoWidth + '×' + video.videoHeight + ' ⚡)';
      runNativeScanLoop(video, nativeDetector);
    } else {
      statusEl.textContent = t('scan_aim') + ' (' + video.videoWidth + '×' + video.videoHeight + ')';
      // getUserMedia بيديك فريمات فيديو مضغوطة بمعدل ريفريش عالي (كويسة للعرض بس مش لتفاصيل باركود دقيقة).
      // ImageCapture.takePhoto() بيطلب من الكاميرا "لقطة" حقيقية بأقصى دقة السنسور + دورة فوكس كاملة، زي بالظبط اللي سكانر الكاميرا
      // الأصلي في الموبايل بيعمله. بندمجها مع لوب الفيديو السريع: اللوب السريع بيمسك الحالات السهلة فورًا،
      // واللقطات الدورية دي بتمسك الحالات الصعبة (كود صغير/بعيد) اللي فشل فيها الفريم العادي.
      let imageCapture = null;
      try{ if(typeof ImageCapture !== 'undefined') imageCapture = new ImageCapture(scanStream.getVideoTracks()[0]); }catch(e){ imageCapture = null; }
      if(imageCapture) startPhotoCaptureLoop(video, imageCapture);
      runScanLoop(video);
    }
  }catch(e){
    statusEl.textContent = t('err_scan_failed');
    console.warn('barcode scan failed', e);
    stopBarcodeScan();
  }
}
let scanStream = null, scanRAF = null, scanCanvas = null, scanPhotoTimer = null, scanPhotoBusy = false;
// بنقص بس منطقة المربع التوجيهي من كل فريم ونكبّرها لمساحة أعلى قبل ما نديها لـ ZXing —
// ده بيدي دقة بكسل أعلى بكتير على الكود من قراءة الفريم الكامل، وأهم حاجة إنه مش محتاج زوم هاردوير قوي
// عشان يقرا كود صغير بعيد زي الـ GS1 DataMatrix المربع؛ المربع اللي المستخدم بيحاذي عليه بقى فعليًا هو المنطقة
// اللي بتتحلل، فتقريب الكود جواه هو اللي بيحدد النجاح — مش شكل المربع نفسه.
const SCAN_TIMEOUT_MS = 15000; // لو 15 ثانية فاتت من غير قراءة ناجحة، بنوقف ونعرض "يتعذر القراءة، حاول مرة أخرى" بدل ما نسيبه ينتظر بلا نهاية بصمت
const SCAN_OUT_W = 640; // عرض ثابت للكانفاس اللي بنكبّر عليه القصّة قبل فك الترميز
const PHOTO_CAPTURE_INTERVAL_MS = 1000; // كل قد ايه بنجرب لقطة عالية الدقة (takePhoto) جنب لوب الفيديو السريع
function runScanLoop(video){
  // مفيش auto-stop خالص — بيفضل يحاول لحد ما يقرأ أو المستخدم يوقفه بزر "تخطّي وإدخال يدوي"
  function tick(){
    if(!scanStream) return; // اتوقف المسح
    if(video.videoWidth && video.readyState >= 2){
      try{
        const result = decodeCroppedSource(video, video.videoWidth, video.videoHeight, getGuideCropFraction(video));
        stopBarcodeScan();
        onBarcodeDecoded(result.getText());
        return;
      }catch(err){
        // NotFoundException/ChecksumException/FormatException متوقعة كل فريم مفيهوش كود قابل للقراءة جوه المربع.
        // أي حاجة تانية معناها باگ حقيقي في كود القص/الفك، فلازم تتلوگ عشان ما تتخبّاش زي ما حصل قبل كده
        const expected = err && (err.name === 'NotFoundException' || err.name === 'ChecksumException' || err.name === 'FormatException');
        if(!expected) console.error('scan loop unexpected error', err);
      }
    }
    scanRAF = requestAnimationFrame(tick);
  }
  scanRAF = requestAnimationFrame(tick);
}
// كل ثانية بناخد "لقطة" فوتوغرافية حقيقية (مش فريم فيديو) — دي بتخلي الكاميرا تعمل فوكس كامل وتديك أقصى دقة سنسور،
// أقرب بكتير لسلوك سكانر الكاميرا الأصلي اللي بيقرا الكود واحنا مش بنقراه من نفس الفريم المضغوط اللي الفيديو بيدّيه
function startPhotoCaptureLoop(video, imageCapture){
  scanPhotoTimer = setInterval(async function(){
    if(!scanStream || scanPhotoBusy) return;
    scanPhotoBusy = true;
    try{
      const blob = await imageCapture.takePhoto();
      const bmp = await createImageBitmap(blob);
      try{
        const result = decodeCroppedSource(bmp, bmp.width, bmp.height, getGuideCropFraction(video));
        stopBarcodeScan();
        onBarcodeDecoded(result.getText());
      }finally{
        if(bmp.close) bmp.close();
      }
    }catch(err){
      const expected = err && (err.name === 'NotFoundException' || err.name === 'ChecksumException' || err.name === 'FormatException');
      if(!expected) console.warn('photo-capture decode attempt failed', err);
    }finally{
      scanPhotoBusy = false;
    }
  }, PHOTO_CAPTURE_INTERVAL_MS);
}
// نسبة مكان المربع التوجيهي كنسبة 0..1 من مساحة الفيديو المعروضة — مستقلة عن دقة المصدر، عشان نقدر نطبّقها
// سواء على فريم فيديو حي أو على لقطة takePhoto اللي غالبًا بتيجي بدقة مختلفة تمامًا عن الفيديو
function getGuideCropFraction(video){
  const vRect = video.getBoundingClientRect();
  const gRect = video.parentElement.querySelector('.scan-guide').getBoundingClientRect();
  return {
    fx: Math.max(0, (gRect.left - vRect.left) / vRect.width),
    fy: Math.max(0, (gRect.top - vRect.top) / vRect.height),
    fw: gRect.width / vRect.width,
    fh: gRect.height / vRect.height
  };
}
function decodeCroppedSource(source, srcW, srcH, frac){
  const x = Math.max(0, frac.fx * srcW);
  const y = Math.max(0, frac.fy * srcH);
  const w = Math.min(frac.fw * srcW, srcW - x);
  const h = Math.min(frac.fh * srcH, srcH - y);
  if(!scanCanvas) scanCanvas = document.createElement('canvas');
  const ctx = scanCanvas.getContext('2d', { willReadFrequently: true });
  // لازم نحافظ على نسبة أبعاد منطقة القص وإحنا بنكبّرها — تربيع/تمطيط الصورة بيكسر نسب عرض الخطوط
  // في الباركود الخطي (1D) وبيمنع فك الترميز حتى لو الكود واضح تمامًا
  const outH = Math.round(SCAN_OUT_W * (h / w));
  scanCanvas.width = SCAN_OUT_W;
  scanCanvas.height = outH;
  ctx.drawImage(source, x, y, w, h, 0, 0, SCAN_OUT_W, outH);
  const luminance = new ZXing.HTMLCanvasElementLuminanceSource(scanCanvas);
  const bitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminance));
  return gs1CodeReader.decodeBitmap(bitmap);
}
// ===== المسار الأصلي: BarcodeDetector (محرك الموبايل نفسه / ML Kit) =====
// بنجهّز الكاشف مرة، ونطلب بس الصيغ اللي فعلاً بيدعمها الجهاز (getSupportedFormats) عشان الإنشاء ما يفشلش
// على صيغة غير مدعومة. لو مفيش أي صيغة مفيدة مدعومة بنرجّع null فيرجع الكود لمسار ZXing.
async function initNativeDetector(){
  if(!('BarcodeDetector' in window)) return null;
  try{
    const supported = await BarcodeDetector.getSupportedFormats();
    const want = ['code_128','code_39','code_93','ean_13','ean_8','upc_a','upc_e','itf','codabar','data_matrix','qr_code'];
    const formats = want.filter(function(f){ return supported.indexOf(f) !== -1; });
    if(!formats.length) return null;
    return new BarcodeDetector({ formats: formats });
  }catch(e){ console.warn('BarcodeDetector init failed', e); return null; }
}
// لوب مسح أصلي: نفس اقتصاص المربع التوجيهي بتاع ZXing (عشان ما نقراش باركود جنبه بالغلط) لكن بندي القصّة
// للمحرك الأصلي بدقتها الطبيعية بدل التصغير — أعلى تفاصيل ممكنة للكود الصغير/البعيد.
async function runNativeScanLoop(video, detector){
  // بنمسح الفريم كامل (مش بس جوه المربع) — المحرك الأصلي بيلاقي الباركود في أي مكان في الصورة،
  // فمفيش داعي تظبطه جوه مربع صغير؛ بس صوّب الكاميرا على الكرتونة والباركود ظاهر. ومفيش auto-stop خالص.
  const statusEl = document.getElementById('barcodeStatus');
  let attempts = 0, lastUiAt = 0, lastErr = '';
  async function tick(){
    if(!scanStream) return; // اتوقف المسح
    if(video.videoWidth && video.readyState >= 2){
      try{
        const barcodes = await detector.detect(video);
        attempts++;
        if(barcodes && barcodes.length){ stopBarcodeScan(); onBarcodeDecoded(barcodes[0].rawValue); return; }
      }catch(err){ lastErr = (err && (err.name || err.message)) || 'error'; console.warn('native detect attempt failed', err); }
    }
    // مؤشّر حي كل ~0.4 ثانية — يورّي المستخدم إنه فعلاً بيبحث (مش صامت)، والعدّاد بيزيد يعني الاستشعار شغّال.
    // لو ظهر ⚠️ مع اسم خطأ = detect نفسه بيفشل؛ لو العدّاد ثابت على 0 = الكاميرا مش جاهزة/الفيديو مش شغّال.
    const now = performance.now();
    if(now - lastUiAt > 400){
      lastUiAt = now;
      statusEl.textContent = lastErr
        ? ('⚠️ ' + lastErr)
        : ('🔎 يبحث عن الباركود… ' + video.videoWidth + '×' + video.videoHeight + ' ⚡ (' + attempts + ')');
    }
    if(scanStream) scanRAF = requestAnimationFrame(tick);
  }
  scanRAF = requestAnimationFrame(tick);
}
async function detectCroppedNative(detector, source, srcW, srcH, frac){
  const x = Math.max(0, frac.fx * srcW);
  const y = Math.max(0, frac.fy * srcH);
  const w = Math.min(frac.fw * srcW, srcW - x);
  const h = Math.min(frac.fh * srcH, srcH - y);
  if(!scanCanvas) scanCanvas = document.createElement('canvas');
  const ctx = scanCanvas.getContext('2d', { willReadFrequently: true });
  scanCanvas.width = Math.max(1, Math.round(w));
  scanCanvas.height = Math.max(1, Math.round(h));
  ctx.drawImage(source, x, y, w, h, 0, 0, scanCanvas.width, scanCanvas.height);
  const barcodes = await detector.detect(scanCanvas);
  return (barcodes && barcodes.length) ? barcodes[0].rawValue : null;
}

}

// بعض الكاميرات (خصوصًا أندرويد كروم) بتدعم زوم حقيقي عبر MediaStreamTrack.applyConstraints — ده اللي بيكبّر الباركود فعليًا
// جوه البكسلات اللي بتتقرا (مش زوم شكلي بالـ CSS اللي بيكبّر العرض بس مش الدقة الفعلية)، مهم جدًا للأكواد الصغيرة زي الـ GS1 DataMatrix المربع.
// ZXing نفسه (@zxing/library) مالوش API للزوم/الفلاش، فبنمسك الـ MediaStream مباشرة من عنصر الفيديو بعد ما ZXing يشغّله عليه
let zoomTrack = null;
function setupZoomControl(){
  const row = document.getElementById('zoomRow');
  const slider = document.getElementById('zoomSlider');
  zoomTrack = null;
  try{
    const stream = document.getElementById('barcodeVideo').srcObject;
    const track = stream && stream.getVideoTracks && stream.getVideoTracks()[0];
    const caps = track && track.getCapabilities ? track.getCapabilities() : null;
    if(!track || !caps || !caps.zoom){ row.classList.add('hidden'); return; }
    zoomTrack = track;
    const settings = track.getSettings ? track.getSettings() : {};
    slider.min = caps.zoom.min;
    slider.max = caps.zoom.max;
    slider.step = caps.zoom.step || 0.1;
    const start = Math.min(caps.zoom.max, Math.max(caps.zoom.min, settings.zoom || caps.zoom.min + (caps.zoom.max - caps.zoom.min) * 0.35));
    slider.value = start;
    row.classList.remove('hidden');
    track.applyConstraints({ advanced: [{ zoom: start }] }).catch(function(){});
  }catch(e){
    console.warn('zoom capability check failed', e);
    row.classList.add('hidden');
  }
}
function onZoomChange(value){
  if(!zoomTrack) return;
  zoomTrack.applyConstraints({ advanced: [{ zoom: parseFloat(value) }] }).catch(function(){});
}
function onBarcodeDecoded(text){

// فك تشفير GS1-128 (Application Identifiers): 01=GTIN، 10=باتش (متغيّر الطول)، 11=إنتاج، 17=انتهاء، 310x=وزن صافي كجم
function parseGS1Barcode(raw){
  const GS = String.fromCharCode(29);
  const s = (raw || '').replace(/^\]C1/, '');
  const out = {};
  let i = 0;
  while(i < s.length){
    const ai2 = s.substr(i, 2), ai4 = s.substr(i, 4);
    if(ai2 === '01' && /^\d{14}/.test(s.substr(i + 2))){ out.gtin = s.substr(i + 2, 14); i += 16; continue; }
    if(ai2 === '11' && /^\d{6}/.test(s.substr(i + 2))){ out.prodDate = gs1DateToIso(s.substr(i + 2, 6)); i += 8; continue; }
    if(ai2 === '17' && /^\d{6}/.test(s.substr(i + 2))){ out.expDate = gs1DateToIso(s.substr(i + 2, 6)); i += 8; continue; }
    if(ai2 === '10'){
      let end = s.indexOf(GS, i + 2);
      if(end === -1) end = s.length;
      end = Math.min(end, i + 2 + 20);
      out.batch = s.substring(i + 2, end);
      i = (end < s.length && s[end] === GS) ? end + 1 : end;
      continue;
    }
    if(/^310[0-9]$/.test(ai4) && /^\d{6}/.test(s.substr(i + 4))){
      out.weightKg = (+s.substr(i + 4, 6)) / Math.pow(10, +ai4[3]);
      i += 10; continue;
    }
    i++;
  }
  return out;
}
function gs1DateToIso(yymmdd){
  const yy = yymmdd.slice(0, 2), mm = yymmdd.slice(2, 4), dd = yymmdd.slice(4, 6);
  const yyyy = (+yy <= 50 ? '20' : '19') + yy;
  return yyyy + '-' + mm + '-' + dd;
}

// ✅ فحص جودة الصورة قبل الاعتماد عليها في القراءة — بيحسب درجة التشويش (بلور، عبر تباين لابلاسيان) والإضاءة (فاتحة/غامقة قوي)
// على نسخة مصغّرة من الصورة (أسرع، مش محتاجين دقة عالية للفحص ده). تحذير بس مش منع — القرار للعامل لو حاسس الصورة أصلاً كويسة
function assessImageQuality(dataUrl){
  return new Promise(function(resolve){
    const img = new Image();
    img.onload = function(){
      try{
        const scale = Math.min(1, 400 / img.width);
        const w = Math.max(1, Math.round(img.width * scale)), h = Math.max(1, Math.round(img.height * scale));
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const d = ctx.getImageData(0, 0, w, h).data;
        const gray = new Float32Array(w * h);
        let sum = 0;
        for(let i = 0, p = 0; i < d.length; i += 4, p++){
          const g = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
          gray[p] = g; sum += g;
        }
        const brightness = sum / gray.length;
        // لابلاسيان بسيط (4 جيران) — تباين عالي = حواف واضحة (صورة حادة)، تباين واطي = بلور
        let lapSum = 0, lapSumSq = 0, count = 0;
        for(let y = 1; y < h - 1; y++){
          for(let x = 1; x < w - 1; x++){
            const idx = y * w + x;
            const lap = 4*gray[idx] - gray[idx-1] - gray[idx+1] - gray[idx-w] - gray[idx+w];
            lapSum += lap; lapSumSq += lap*lap; count++;
          }
        }
        const mean = lapSum / count;
        const sharpness = (lapSumSq / count) - (mean * mean); // variance
        resolve({
          brightness: brightness,
          sharpness: sharpness,
          isBlurry: sharpness < 60,
          isTooDark: brightness < 55,
          isTooBright: brightness > 215
        });
      }catch(err){ resolve(null); } // فشل الفحص نفسه — منكملش نمنع، نسيب OCR يجرب عادي
    };
    img.onerror = function(){ resolve(null); };
    img.src = dataUrl;
  });
}

// تجهيز الصورة قبل الـ OCR: تدرج رمادي + تحويل ثنائي أبيض/أسود بعتبة Otsu (بتلاقي أفضل عتبة تفصل النص عن الخلفية تلقائيًا)
// + تكبير لو الصورة صغيرة — الليبلات فيها لمعان/إضاءة متفاوتة بتلخبط Tesseract على الصورة الملوّنة الخام، البينري بيحسّن الدقة كتير
function preprocessImageForOCR(dataUrl){
  return new Promise(function(resolve){
    const img = new Image();
    img.onload = function(){
      try{
        const scale = img.width < 1400 ? 1400 / img.width : 1;
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const d = imgData.data;
        const n = d.length / 4;
        const gray = new Uint8ClampedArray(n);
        const hist = new Array(256).fill(0);
        for(let i=0,p=0;i<d.length;i+=4,p++){
          const g = Math.round(0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2]);
          gray[p] = g; hist[g]++;
        }
        let sum=0; for(let v=0;v<256;v++) sum += v*hist[v];
        let sumB=0, wB=0, wF=0, maxVar=0, threshold=127;
        for(let v=0;v<256;v++){
          wB += hist[v]; if(wB===0) continue;
          wF = n - wB; if(wF===0) break;
          sumB += v*hist[v];
          const mB = sumB/wB, mF = (sum-sumB)/wF;
          const varBetween = wB*wF*(mB-mF)*(mB-mF);
          if(varBetween > maxVar){ maxVar = varBetween; threshold = v; }
        }
        for(let i=0,p=0;i<d.length;i+=4,p++){
          const v = gray[p] < threshold ? 0 : 255;
          d[i]=d[i+1]=d[i+2]=v;
        }
        ctx.putImageData(imgData, 0, 0);
        resolve(canvas.toDataURL('image/png'));
      }catch(e){ console.warn('OCR preprocess failed, using original image', e); resolve(dataUrl); }
    };
    img.onerror = function(){ resolve(dataUrl); };
    img.src = dataUrl;
  });
}

// ✅ استخراج بقواعد بسيطة مبنية على أشكال ليبلات حقيقية (FUTURE PACK / UCIC / Jamjoom)
function parseLabelText(text){
  // ✅ OCR عربي+إنجليزي مختلط بيحط علامات اتجاه/فراغات صفرية مخفية (LRM/RLM إلخ) جوه الكلمات الإنجليزية
  // نفسها — بتبان زي نص سليم بس بتكسر مطابقة الكلمة المفتاحية الحرفية. لازم نشيلها قبل أي حاجة.
  var BIDI_CTRL_RE = new RegExp(String.fromCharCode(91) + '\\u200B-\\u200F\\u202A-\\u202E\\u2066-\\u2069\\uFEFF' + String.fromCharCode(93), 'g');
  text = (text||'').normalize('NFKC').replace(BIDI_CTRL_RE, '');
  const lines = text.split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
  const out = {};

  // كل عنصر في keywords بيتفحص في كل السطور الأول قبل ما نروح للعنصر اللي بعده —
  // عشان كلمة عامة زي "ITEM" ماتخطفش القيمة من سطر "Item Description" الأدق
  // بيدور في الاتجاهين: "KEYWORD: value" (الشكل الشائع) و"value | KEYWORD" (جداول بعض الموردين بتيجي مقلوبة)
  function findAfterKeyword(keywords){
    for(const kw of keywords){
      const kwEsc = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const boundaryStart = /^[A-Z]/.test(kw) ? '\\b' : '';
      // اللوك-أهيد بيمنع "PRODUCT" من مطابقة "PRODUCTION" — بس بيتفعّل بس لو الكلمة نفسها بتخلص بحرف
      const boundaryEnd = /[A-Z]$/i.test(kw) ? '(?![A-Z])' : '';
      const re = new RegExp(boundaryStart + kwEsc + boundaryEnd);
      for(const line of lines){
        const upper = line.toUpperCase();
        const m = upper.match(re);
        if(!m) continue;
        const after = line.slice(m.index + kw.length).replace(/^[\s:._|-]+/, '').trim();
        if(after) return after;
        const before = line.slice(0, m.index).replace(/[\s:._|-]+$/, '').trim();
        if(before) return before;
      }
    }
    return '';
  }

  // الصنف: الأدق الأول (ITEM NAME / ITEM DESCRIPTION / PRODUCT) قبل الكلمة العامة "ITEM" (عشان متتلخبطش مع "Item Code")
  out.item = findAfterKeyword(['ITEM NAME', 'ITEM DESCRIPTION', 'PRODUCT :', 'PRODUCT:', 'PRODUCT', 'ITEM :', 'ITEM:', 'ITEM']);
  // ✅ "PRODUCT OF AUSTRALIA" مش اسم صنف — بلد المنشأ. لو الاسم طلع بلد/كلمة عامة (أو فاضي)، نرجع لأول سطر منطقي:
  // اسم المنتج على كراتين اللحوم المستوردة بيكون أعلى سطر (زي "BONELESS MUTTON") من غير أي كلمة مفتاحية.
  if(!out.item || /^OF\b/i.test(out.item) || /^(AUSTRALIA|BRAZIL|BRASIL|INDIA|USA|NEW ZEALAND|IRELAND)\b/i.test(out.item)){
    const noiseRe = /PRODUCT OF|EST\.?\s*NO|KEEP FROZEN|NET\s*WE?I?G?H?T?|PACKED|SLAUGHTER|USE\s*BY|BEST\s*BEFORE|HALAL|INSPECTED|LOCN|OPR|TIME\s*:/i;
    const firstGood = lines.find(function(l){ return /[A-Z]{3,}/i.test(l) && !noiseRe.test(l) && !/^\d/.test(l); });
    if(firstGood) out.item = firstGood;
  }
  // ✅ تلميحات المطابقة: كود المقاس/المواصفة (50CL / 20*400) + اختصارات اللحوم الشائعة على الكراتين مفكوكة لمصطلح الداتابيز.
  // بتتضاف لنص المطابقة عشان الصنف يترّبط بكوده حتى لو الاسم الظاهر مختلف عن اسم قاعدة البيانات (BONELESS MUTTON ↔ MUTTON TRIMMINGS).
  const hints = extractAnchors(text);
  if(/\bM[-\s]?TRMG\b|\bTRMG\b|\bTRIM(MING)?S?\b/i.test(text)) hints.push('TRIMMINGS'); // M-TRMG = Mutton TRiMminG
  if(/\bB\/?L\b|\bBNLS\b|\bBONELESS\b/i.test(text)) hints.push('BONELESS');
  if(/\bMINCE(D)?\b|\bQEEMA\b|\bKEEMA\b/i.test(text)) hints.push('MINCE');
  out.matchHints = hints;

  // ✅ التواريخ من الليبل هي الأساس دلوقتي (الباركود بقى احتياطي — أحيانًا صلاحيته مش مطابقة للّيبل).
  // بندعم مسمّيات متعددة اللغات (إنجليزي/إسباني/برتغالي/ألماني/فرنسي) لأن ليبلات اللحوم المستوردة مختلطة اللغات،
  // وبندوّر على التاريخ في نفس سطر الكلمة المفتاحية أو في السطر/السطرين اللي بعدها (الجداول بتفصل المسمّى عن القيمة).
  const dateRegex = /(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}|\d{1,2}[\-\s][A-Z]{3}[\-\s]\d{2,4})/i;
  function findDateNear(keywordRe){
    for(let i = 0; i < lines.length; i++){
      if(!keywordRe.test(lines[i])) continue;
      const same = lines[i].match(dateRegex);
      if(same) return normalizeDate(same[0]);
      for(let j = i + 1; j <= i + 2 && j < lines.length; j++){
        const nxt = lines[j].match(dateRegex);
        if(nxt) return normalizeDate(nxt[0]);
      }
    }
    return '';
  }
  // تاريخ الإنتاج (Production / Producción / Date de production / F.Prod) — وكمان "PACKED ON" (تاريخ التعبئة = الإنتاج على كراتين اللحوم)،
  // بنتجنّب SLAUGHTER/ذبح/Faena و Congelado/تجميد لأنها تواريخ أقدم مش تاريخ الإنتاج الفعلي.
  const slaughterRe = /SLAUGHTER|ذبح|FAENA|CONGELAD|تجميد/i;
  out.prodDate = findDateNear(/PRODUCTION|PRODUCC|PRODUZ|DATE OF PROD|F\.?\s*PROD|PROD\.?\s*DATE|PACKED\s*ON|PACK\s*DATE|PACKING\s*DATE|التعبئة/i);
  if(!out.prodDate){
    // حل أخير: أول تاريخ ظاهر مش جنب كلمة ذبح/تجميد (عشان ماياخدش تاريخ الذبح غلط)
    for(const line of lines){ if(slaughterRe.test(line)) continue; const m = line.match(dateRegex); if(m){ out.prodDate = normalizeDate(m[0]); break; } }
  }
  // تاريخ الانتهاء/الصلاحية — مسمّيات كتير: To Consume Before / Consumir antes / Data de Validade / Best Before / Use By / Mindestens haltbar / A consommer
  out.expDate = findDateNear(/EXPIR|EXP\.?\s*DATE|BEST\s*BEFORE|BB\s*DATE|CONSUME\s*BEFORE|CONSUMIR|VALIDAD|VALIDADE|USE\s*BY|VENCIM|CADUCIDAD|MINDESTENS|CONSOMMER/i);

  // الكمية: يفضّل كمية الطبلية الواحدة (PALLET) لأننا بنستلم طبلية واحدة فعليًا، مش إجمالي الأوردر
  const qtyKeywordsPriority = ['QTY / PALLET', 'QTY/PALLET', 'QUANTITY/PALLET', 'QUANTITY PER PALLET', 'QTY / BUNDLE', 'QTY/BUNDLE', 'QUANTITY PER BOX', 'QTY PER BOX'];
  let qtyStr = findAfterKeyword(qtyKeywordsPriority);
  if(!qtyStr) qtyStr = findAfterKeyword(['QTY', 'QUANTITY']);
  const qm = (qtyStr||'').match(/\d+/);
  out.qty = qm ? qm[0] : '';
  // ✅ أولوية لشكل رقم الباتش المستخدم فعليًا في المصنع (زي "0707/B2" أو "0807/C1": 3-4 أرقام / حرف / رقم) — أدق بكتير من البحث بكلمة مفتاحية،
  // لأن الختم بيكون جنب نصوص تانية في نفس السطر وممكن الـOCR يخلط حواليها فيرجع نص غلط تمامًا (زي "Day : ..." بدل رقم الباتش الحقيقي)
  const batchPatternMatch = text.match(/\b(\d{3,4}\s*\/\s*[A-Z]\d)\b/i);
  if(batchPatternMatch){
    out.batch = batchPatternMatch[1].replace(/\s+/g, '');
  } else {
    out.batch = findAfterKeyword(['BATCH NO', 'BATCH NUMBER', 'BATCH:', 'BATCH', 'LOT NO', 'LOT NUMBER', 'LOT:', 'LOT']);
  }

  // الوزن: بيدور على أول رقم جنب كلمة وزن محددة — لو النطاق كان مدى (زي "20-100") ياخد أول رقم كتخمين أولي، العامل يصححه لو غلط
  // ✅ شلنا "WT"/"KG" المجردة من هنا — كانت بتتطابق غلط مع أي حاجة فيها "kg" زي اسم صنف "DOUX 2KG" وتاخد رقم مالوش علاقة بوزن الكرتونة فعليًا
  // ✅ بندعم القيمة في نفس السطر أو في السطر/السطرين اللي بعد الكلمة (زي "NETT WEIGHT" فوق و"21.00 kg" تحته)،
  // وبنفضّل الرقم المتبوع بـ kg على أي رقم تاني (عشان ماياخدش الباوند "46.29 lb" غلط).
  const weightKeywords = ['NET WEIGHT', 'NETT WEIGHT', 'PESO NETO', 'POIDS NET', 'PESO LIQUIDO', 'NETTO', 'NET WT', 'NETT WT', 'GROSS WEIGHT', 'WEIGHT'];
  function findWeightKg(){
    for(const kw of weightKeywords){
      const kwU = kw.toUpperCase();
      for(let i = 0; i < lines.length; i++){
        const idx = lines[i].toUpperCase().indexOf(kwU);
        if(idx < 0) continue;
        for(let j = i; j <= i + 2 && j < lines.length; j++){
          const kgM = lines[j].match(/(\d+(?:\.\d+)?)\s*KG\b/i); // رقم متبوع بكيلو = الأدق
          if(kgM) return kgM[1];
          if(j === i){ const anyM = lines[i].slice(idx + kw.length).match(/\d+(?:\.\d+)?/); if(anyM) return anyM[0]; }
        }
      }
    }
    return '';
  }
  const wStr = findWeightKg();
  if(wStr) out.weightKg = wStr;

  return out;
}

function normalizeDate(raw){
  // يحاول يحوّل أي شكل تاريخ لصيغة YYYY-MM-DD المطلوبة لحقل <input type=date>
  const months = {JAN:'01',FEB:'02',MAR:'03',APR:'04',MAY:'05',JUN:'06',JUL:'07',AUG:'08',SEP:'09',OCT:'10',NOV:'11',DEC:'12'};
  let m = raw.match(/(\d{1,2})[\-\s]([A-Z]{3})[\-\s](\d{2,4})/i);
  if(m){
    const mon = months[m[2].toUpperCase()];
    let yr = m[3].length===2 ? '20'+m[3] : m[3];
    if(mon) return yr+'-'+mon+'-'+m[1].padStart(2,'0');
  }
  m = raw.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(m){
    let yr = m[3].length===2 ? '20'+m[3] : m[3];
    // نفترض DD/MM/YYYY (شائع في ليبلات الموردين هنا)
    return yr+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
  }
  return '';
}

// ✅ رقم الباتش الداخلي بيتبني بمعادلة ثابتة (شهر+يوم الإنتاج / خط الإنتاج + رمز الوردية)، مش لازم نقراه من صورة أصلاً —
// زي "0707/B2" = تاريخ إنتاج 07/07 + خط B + وردية 2 (مسائي). بديل أدق من الـOCR لمنتجات المصنع الداخلية (بعكس شحنات الموردين اللي ليها باركود حقيقي)
function computeBatchFromLineShift(){
  const lineShift = document.getElementById('fLineShift').value;
  const prodDate = document.getElementById('fProd').value; // YYYY-MM-DD
  if(!lineShift || !prodDate) return;
  const parts = prodDate.split('-'); // [YYYY, MM, DD]
  if(parts.length !== 3) return;
  const mmdd = parts[1] + parts[2]; // ✅ شهر ثم يوم — عكسناها بناءً على تأكيد المستخدم من الاستخدام الفعلي (مش يوم ثم شهر زي ما كان مفترض قبل كده)
  document.getElementById('fBatch').value = mmdd + '/' + lineShift;
}

// ✅ الوزن الإجمالي = عدد الكراتين × وزن الكرتونة الواحدة — بيتحسب أوتوماتيك، والعامل يقدر يعدّله يدوي لو الوزن اتغيّر فعلياً
// وزن الكرتونة ممكن يتكتب بالجرام أو الكيلوجرام (خانة الاختيار جنبه) — الإجمالي دايمًا بيتخزن بالكيلوجرام
function recalcTotalWeight(){
  const rawUnitWeight = +document.getElementById('fUnitWeight').value || 0;
  if(rawUnitWeight <= 0) return; // مفيش وزن كرتونة معروف — سيب الإجمالي زي ما هو (يتكتب يدوي)
  const isGrams = document.getElementById('fUnitWeightUnit').value === 'g';
  const unitWeightKg = isGrams ? rawUnitWeight / 1000 : rawUnitWeight;
  const qty = +document.getElementById('fQty').value || 1;
  document.getElementById('fWeight').value = (qty * unitWeightKg).toFixed(3);
}

function fillReviewForm(parsed){
  // استلام جديد = نبدأ قائمة أوزان اللحوم من الصفر (ومنشيل وضع الوزن الثابت)
  meatCartons = [];
  confusableConfirmedCode = null; // استلام جديد = لسه محدش أكّد الصنف الشبيه
  const mft = document.getElementById('meatFixedToggle'); if(mft) mft.checked = false;
  document.getElementById('fSupplier').value = ''; // يتملّى من جديد حسب الصنف/النوع
  document.getElementById('fItem').value = parsed.item || '';
  // لو الباركود سبق وملأ الحقل ده، سيبه — الباركود أدق من الـ OCR
  // الليبل هو الأساس للتواريخ: لو الـ OCR قرا تاريخ، يكتب فوق قيمة الباركود (اللي ممكن تكون غلط/غير مطابقة)
  if(parsed.prodDate) document.getElementById('fProd').value = parsed.prodDate;
  if(parsed.expDate) document.getElementById('fExp').value = parsed.expDate;
  if(!document.getElementById('fBatch').value) document.getElementById('fBatch').value = parsed.batch || '';
  document.getElementById('fCode').value = '';
  document.getElementById('fType').value = 'dry';
  // ✅ onItemInput() بتحاول تربط اسم الصنف اللي طلع من الـ OCR بكود من الكتالوج تلقائي (تطابق تمام)،
  // وتعرض قائمة اقتراحات لو مفيش تطابق تمام — وبتملأ عدد الكراتين/وزن الكرتونة من سعات الطبالي المعتمدة لو الصنف معروف (applyCapacityDefaults)
  onItemInput();
  // ✅ مطابقة تلقائية بالمرساة: onItemInput() بتطابق بالاسم الظاهر بس، واسم اللحوم المستوردة غالبًا مختلف عن الداتابيز.
  // هنا بنطابق بالاسم + كود المقاس (50CL / 20*400) اللي التقطناه من سطر الكود — ولو فيه صنف واحد كاسب بفارق واضح
  // (سكور مرساة على الأقل + متفوّق 1.5× على اللي بعده) نختاره تلقائي. غير كده بنسيب قائمة الاقتراحات للعامل يختار.
  if(!document.getElementById('fCode').value && (parsed.item || (parsed.matchHints && parsed.matchHints.length))){
    const matchText = ((parsed.item||'') + ' ' + (parsed.matchHints||[]).join(' ')).trim();
    const ranked = scoreCatalog(matchText);
    if(ranked.length && ranked[0].score >= 50 && (ranked.length < 2 || ranked[0].score >= ranked[1].score * 1.5)){
      const code = ranked[0].c.code;
      document.getElementById('fItem').value = ranked[0].c.nameEn; // نعرض الاسم المعتمد من الكتالوج بدل النص المشوّه
      document.getElementById('fCode').value = code;
      document.getElementById('fType').value = classifyItemByCode(code);
      populateRoomSelect();
      applyCapacityDefaults(code);
      updateReceivingModeUI();
      const box = document.getElementById('itemSuggestions'); box.classList.add('hidden'); box.innerHTML = '';
    }
  }
  // 🛡️ لو الصنف اللي اتعرف عليه أوتوماتيك ينتمي لمجموعة شبيهة، نطلّع كارت المقارنة يطلب تأكيد صريح قبل الحفظ
  refreshConfusableGuard();
  // احتياطي: لو الصنف مش موجود في سعات الطبالي المعتمدة (applyCapacityDefaults ماملتش الحقل)، نرجع لتخمين الـ OCR كحل أخير
  if(!document.getElementById('fUnitWeight').value && parsed.weightKg){ document.getElementById('fUnitWeight').value = parsed.weightKg; document.getElementById('fUnitWeightUnit').value = 'kg'; }
  // لحوم (وزن متغيّر): نحط الوزن الصافي المقروء في خانة إدخال الكرتونة عشان العامل يضيفه بضغطة (أو يعدّله)
  const mwInput = document.getElementById('meatWeightInput');
  if(mwInput && document.getElementById('fType').value === 'frozen' && parsed.weightKg && !mwInput.value){ mwInput.value = parsed.weightKg; }
  if(!document.getElementById('fQty').value) document.getElementById('fQty').value = parsed.qty || '';
  recalcTotalWeight();
  populateRoomSelect();
  populateRackSlot();
  updateReceivingModeUI(); // يظهر قسم اللحوم لو الصنف اتصنّف "مجمّد"
  document.getElementById('reviewCard').classList.remove('hidden');
  checkSlotOccupied();
}

async function saveReceiving(){
  const item = document.getElementById('fItem').value.trim();
  const code = document.getElementById('fCode').value.trim();
  const batch = document.getElementById('fBatch').value.trim();
  const prodDate = document.getElementById('fProd').value;
  const expDate = document.getElementById('fExp').value;
  const qty = +document.getElementById('fQty').value || 0;
  const weightKg = +document.getElementById('fWeight').value || null;
  const driver = (document.getElementById('fDriver') ? document.getElementById('fDriver').value.trim() : '') || '';
  const receiver = (document.getElementById('fReceiver') ? document.getElementById('fReceiver').value.trim() : '') || '';
  const type = document.getElementById('fType').value;
  const loc = currentLoc();
  const msgEl = document.getElementById('saveMsg');

  if(!item || !qty){
    msgEl.className='msg err'; msgEl.textContent=t('err_item_qty'); return;
  }
  // 🛡️ بوابة المتشابهات: لو الصنف له كود وينتمي لمجموعة شبيهة ولسه محدش أكّده صراحةً — نوقف ونطلب التأكيد
  if(code && getConfusableGroup(code).length >= 2 && confusableConfirmedCode !== code){
    msgEl.className='msg err'; msgEl.textContent='⚠️ في أصناف شبه بعض — أكّد الصنف الصح من الكارت قبل الحفظ';
    refreshConfusableGuard();
    const g = document.getElementById('confusableGuard'); if(g) g.scrollIntoView({behavior:'smooth', block:'center'});
    return;
  }
  // الباتش إجباري بس لمواد فيها ضمان إن المورد حاططه فعليًا على الكرتون (مجمد مواد أولية ومنتج نهائي) — الجاف (كراتين/رولات تعبئة) غالبًا مالوش باتش أصلاً
  if(!batch && type !== 'dry'){
    msgEl.className='msg err'; msgEl.textContent=t('err_batch_required'); return;
  }
  const today = new Date().toISOString().slice(0,10);
  if(expDate && expDate < today){
    msgEl.className='msg err'; msgEl.textContent=t('err_exp_past'); return;
  }
  if(prodDate && expDate && prodDate > expDate){
    msgEl.className='msg err'; msgEl.textContent=t('err_prod_after_exp'); return;
  }

  const { data: existing } = await supabaseClient.from('inventory').select('name').eq('organization_id', CURRENT_ORG_ID).eq('loc', loc).maybeSingle();
  if(existing && !confirm(t('confirm_overwrite', {loc: loc, name: existing.name}))){
    return;
  }

  if(batch){
    const { data: dupeBatch } = await supabaseClient.from('inventory').select('loc,name').eq('organization_id', CURRENT_ORG_ID).eq('batch', batch).neq('loc', loc).maybeSingle();
    if(dupeBatch && !confirm(t('confirm_dupe_batch', {batch: batch, loc: dupeBatch.loc, name: dupeBatch.name}))){
      return;
    }
  }

  const supplier = (type === 'final')
    ? document.getElementById('fSupplierFactory').value
    : (document.getElementById('fSupplier').value.trim() || (code && CATALOG[code] ? CATALOG[code].supplier : ''));
  const missing = [];
  if(!supplier) missing.push('المورد');
  if(!code) missing.push('الكود الداخلي');
  const sourceNote = missing.length
    ? '📱 استلام موبايل — ⚠️ بيانات ناقصة (' + missing.join('، ') + ')'
    : '📱 استلام موبايل';

  msgEl.className='msg ok'; msgEl.textContent=t('saving');

  let photoPath = null;
  if(cartonPhotoDataUrl){
    try{
      const blob = await (await fetch(cartonPhotoDataUrl)).blob();
      photoPath = CURRENT_ORG_ID + '/' + loc.replace(/[^A-Za-z0-9-]/g,'_') + '-' + Date.now() + '.jpg';
      const { error: upErr } = await supabaseClient.storage.from('carton-photos').upload(photoPath, blob, { contentType:'image/jpeg' });
      if(upErr){ console.warn('photo upload failed', upErr); photoPath = null; }
    }catch(e){ console.warn('photo upload failed', e); photoPath = null; }
  }

  // لقطة من البيانات زي ما العامل بعتها بالظبط — مرجع أساسي لو المشرف عدّل حاجة وقت المراجعة
  const original_submission = { item, code, prodDate, expDate, qty, batch, weightKg, supplier, driver, receiver, cartonWeights: (Array.isArray(meatCartons) ? meatCartons.slice() : []) };

  const row = {
    organization_id: CURRENT_ORG_ID, loc: loc, code: code||item, name: item, supplier: supplier||null,
    cartons: qty, exp_date: expDate||null, prod_date: prodDate||null, batch: batch,
    weight_kg: weightKg, photo_url: photoPath, original_submission: original_submission,
    status: 'good', source: sourceNote, in_date: new Date().toISOString().slice(0,10),
    fill: 'موبايل', hold: true, hold_reason: '📱 استلام موبايل — بانتظار موافقة المشرف', disabled: false
  };
  const { error } = await supabaseClient.from('inventory').upsert(row, {onConflict:'organization_id,loc'});
  if(error){
    msgEl.className='msg err'; msgEl.textContent=t('err_save_failed', {msg: error.message});
    return;
  }
  // يظهر في لوحة "سجل العمليات" على الديسكتوب تلقائيًا (نفس جدول ops_log)
  supabaseClient.from('ops_log').insert({
    organization_id: CURRENT_ORG_ID,
    action: '📸 استلام موبايل (بانتظار موافقة)',
    details: item + ' — ' + qty + ' كرتون — ' + loc + ' — باتش ' + batch,
    performed_by: (currentUser && currentUser.id) || null
  }).then(function(r){ if(r.error) console.warn('ops_log insert failed', r.error); });
  msgEl.className='msg'; msgEl.textContent='';
  document.getElementById('reviewCard').classList.add('hidden');
  document.getElementById('confirmSummary').textContent = item + ' — ' + qty + ' ' + t('cartons_word') + ' — ' + loc + ' — ' + t('pending_review_tag');
  document.getElementById('saveConfirm').classList.remove('hidden');
}

let searchTimer = null;
function doSearch(){
  clearTimeout(searchTimer);
  searchTimer = setTimeout(runSearch, 300);
}
async function runSearch(){
  const q = document.getElementById('searchBox').value.trim();
  const resultsEl = document.getElementById('searchResults');
  if(!q){ resultsEl.innerHTML=''; return; }
  const { data, error } = await supabaseClient.from('inventory').select('*')
    .eq('organization_id', CURRENT_ORG_ID)
    .or('code.ilike.%'+q+'%,name.ilike.%'+q+'%,loc.ilike.%'+q+'%')
    .limit(30);
  if(error){ resultsEl.innerHTML = '<div class="msg err">'+t('err_search', {msg: error.message})+'</div>'; return; }
  if(!data || !data.length){ resultsEl.innerHTML = '<div style="color:#64748b;font-size:13px;text-align:center;padding:10px">'+t('no_results')+'</div>'; return; }
  resultsEl.innerHTML = data.map(function(r){
    const holdBadge = r.hold ? ' 🔒' : '';
    const wdBtn = r.hold
      ? ''
      : '<button class="btn-ghost" style="width:auto;padding:6px 10px;font-size:11.5px" onclick="startWithdraw(\''+r.loc+'\')" data-i18n="withdraw_btn">'+t('withdraw_btn')+'</button>';
    return '<div class="result-row" style="align-items:center"><span><b>'+(r.name||r.code)+holdBadge+'</b><br><span style="color:#64748b;font-size:11.5px">'+r.loc+'</span></span>'
      + '<span style="display:flex;align-items:center;gap:8px"><span style="color:#e8622c;font-weight:700">'+(r.cartons||0)+' '+t('cartons_word')+'</span>'+wdBtn+'</span></div>';
  }).join('');
}

let WD_LOC = null, WD_ITEM = null;
async function startWithdraw(loc){
  cancelWithdraw();
  const { data, error } = await supabaseClient.from('inventory').select('*').eq('organization_id', CURRENT_ORG_ID).eq('loc', loc).maybeSingle();
  if(error || !data){ alert(t('not_found_or_error')); return; }
  if(data.hold){ alert(t('err_withdraw_held')); return; }
  WD_LOC = loc; WD_ITEM = data;
  document.getElementById('withdrawInfo').innerHTML = '<b>'+(data.name||data.code)+'</b><br><span style="color:#94a3b8;font-size:12px">'+loc+' · '+data.cartons+' '+t('cartons_word')+'</span>';
  const qtyInput = document.getElementById('wdQty');
  qtyInput.value = data.cartons; qtyInput.max = data.cartons;
  document.getElementById('withdrawCard').classList.remove('hidden');
  document.getElementById('withdrawCard').scrollIntoView({behavior:'smooth', block:'nearest'});
}

  if(!WD_LOC || !WD_ITEM) return;
  const qty = +document.getElementById('wdQty').value || 0;
  const msgEl = document.getElementById('withdrawMsg');
  if(qty <= 0 || qty > (+WD_ITEM.cartons||0)){ msgEl.className='msg err'; msgEl.textContent=t('err_withdraw_qty'); return; }
  if(!confirm(t('confirm_withdraw', {qty: qty, name: WD_ITEM.name||WD_ITEM.code, loc: WD_LOC}))) return;

  const parts = WD_LOC.split('-'); // room-rack-level-slot
  const room = parts[0], level = parts[2];

  await supabaseClient.from('withdrawn_log').insert({
    organization_id: CURRENT_ORG_ID, code: WD_ITEM.code, name: WD_ITEM.name, loc: WD_LOC, room: room, level: level,
    pal_num: WD_ITEM.batch||null, pal_label: WD_ITEM.batch||null, cartons: qty,
    item_type: WD_ITEM.item_type||classifyItemByCode(WD_ITEM.code), source: '📱 سحب موبايل',
    withdrawn_at: new Date().toISOString(), performed_by: (currentUser&&currentUser.id)||null
  });

  const remaining = (+WD_ITEM.cartons||0) - qty;
  if(remaining > 0){
    await supabaseClient.from('inventory').update({ cartons: remaining }).eq('organization_id', CURRENT_ORG_ID).eq('loc', WD_LOC);
  } else {
    await supabaseClient.from('inventory').delete().eq('organization_id', CURRENT_ORG_ID).eq('loc', WD_LOC);
  }

  supabaseClient.from('ops_log').insert({
    organization_id: CURRENT_ORG_ID, action: '📤 سحب موبايل',
    details: (WD_ITEM.name||WD_ITEM.code) + ' — ' + qty + ' كرتون — ' + WD_LOC,
    performed_by: (currentUser&&currentUser.id)||null
  }).then(function(r){ if(r.error) console.warn('ops_log insert failed', r.error); });

  cancelWithdraw();
  runSearch();
  alert(t('withdraw_done'));
}
</script>
